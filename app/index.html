<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>HA4KaiOS</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <span id="header-title">HA4KaiOS</span>
      <span id="header-status" class="status status-offline">offline</span>
    </header>

    <main id="main">
      <div id="view" class="view"></div>
    </main>

    <footer id="softkeys">
      <span id="sk-left" class="softkey softkey-left"></span>
      <span id="sk-center" class="softkey softkey-center"></span>
      <span id="sk-right" class="softkey softkey-right"></span>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="qr-overlay" class="qr-overlay hidden">
    <video id="qr-video" class="qr-video" autoplay muted playsinline></video>
    <canvas id="qr-canvas" class="qr-canvas"></canvas>
    <div id="qr-frame" class="qr-frame"></div>
    <div id="qr-hint" class="qr-hint">Point at the token QR code</div>
  </div>

  <script src="js/vendor/jsQR.js"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/xhr.js"></script>
  <script src="js/ha-client.js"></script>
  <script src="js/format.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/components/menu.js"></script>
  <script src="js/components/entitylist.js"></script>
  <script src="js/domains.js"></script>
  <script src="js/views/setup.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/areas.js"></script>
  <script src="js/views/favorites.js"></script>
  <script src="js/views/all.js"></script>
  <script src="js/views/detail.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
